<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book a Service | Beyond Trust</title>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    #particles-js {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -10;
    }
  </style>
</head>
<body class="bg-black text-gray-800 relative overflow-x-hidden">

  <!-- Particles Background -->
  <div id="particles-js"></div>

  <!-- Navbar -->
  <header class="fixed top-0 left-0 w-full bg-black bg-opacity-80 shadow backdrop-blur-md z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <!-- Logo -->
      <div class="flex items-center space-x-3">
        <img src="images/logo.png" alt="logo" class="h-12 w-12 rounded-full">
        <h1 class="text-2xl font-bold text-teal-300">Beyond Trust - Health Care Services</h1>
      </div>

      <!-- Navigation -->
      <nav class="space-x-6 text-white">
        <a href="index.html" class="hover:text-teal-300">Home</a>
        <a href="services.html" class="hover:text-teal-300">Services</a>
        <a href="booking.html" class="text-teal-300 font-semibold">Book Now</a>
        <a href="contacts.html" class="hover:text-teal-300">Contact Us</a>
        <a href="login.html" class="inline-block bg-teal-300 text-black px-4 py-1 rounded-lg hover:bg-teal-300 hover:text-black transition">Login</a>
      </nav>
    </div>
  </header>

  <!-- Booking Form -->
   <main class="relative z-10 flex items-center justify-center min-h-screen pt-20 px-4">
    <div class="bg-white bg-opacity-90 p-8 rounded-lg shadow-lg w-full max-w-md backdrop-blur">
      <h2 class="text-2xl font-bold text-center text-blue-700 mb-6">Book a Wellness Service</h2>

    <form action="booking_process.php" method="POST" class="bg-white p-8 rounded-lg shadow space-y-6">

      <!-- Full Name -->
      <div>
        <label for="name" class="block mb-1 font-medium">Full Name</label>
        <input type="text" id="name" name="name" required class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"/>
      </div>

      <!-- Email -->
      <div>
        <label for="email" class="block mb-1 font-medium">Email Address</label>
        <input type="email" id="email" name="email" required class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"/>
      </div>

      <!-- Service Type -->
      <div>
        <label for="service" class="block mb-1 font-medium">Select Service</label>
        <select id="service" name="service" required class="w-full px-4 py-2 border border-gray-300 rounded">
          <option value="" disabled selected>Select a service</option>
          <option value="massage">Massage Therapy</option>
          <option value="fitness">Personal Fitness</option>
          <option value="grooming">Grooming</option>
          <option value="eldercare">Eldercare Assistance</option>
        </select>
      </div>

      <!-- Provider -->
      <div>
        <label for="provider" class="block mb-1 font-medium">Preferred Provider</label>
        <input type="text" id="provider" name="provider" placeholder="(Optional)" class="w-full px-4 py-2 border border-gray-300 rounded"/>
      </div>

      <!-- Date and Time -->
      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <label for="date" class="block mb-1 font-medium">Preferred Date</label>
          <input type="date" id="date" name="date" required class="w-full px-4 py-2 border border-gray-300 rounded"/>
        </div>
        <div>
          <label for="time" class="block mb-1 font-medium">Preferred Time</label>
          <input type="time" id="time" name="time" required class="w-full px-4 py-2 border border-gray-300 rounded"/>
        </div>
      </div>

      <!-- Message -->
      <div>
        <label for="message" class="block mb-1 font-medium">Additional Notes</label>
        <textarea id="message" name="message" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded"></textarea>
      </div>

      <!-- Submit -->
      <div class="text-center">
        <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition duration-300 shadow-md hover:scale-105 transform">
          Confirm Booking
        </button>
      </div>
    </form>
  </section>
    </div>

  </main>
      <!-- Footer -->
  <footer class="bg-gray-800 text-white py-4 text-center z-10 relative">
    © 2025 Beyond Trust Health Care Services
  </footer>

  <!-- Particles.js Script -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    particlesJS("particles-js", {
      particles: {
        number: { value: 60, density: { enable: true, value_area: 800 } },
        color: { value: "#93c5fd" },
        shape: { type: "circle" },
        opacity: { value: 0.3 },
        size: { value: 3, random: true },
        line_linked: {
          enable: true,
          distance: 150,
          color: "#93c5fd",
          opacity: 0.4,
          width: 1
        },
        move: {
          enable: true,
          speed: 2,
          direction: "none",
          out_mode: "out"
        }
      },
      interactivity: {
        events: {
          onhover: { enable: true, mode: "repulse" },
          onclick: { enable: true, mode: "push" }
        },
        modes: {
          repulse: { distance: 100 },
          push: { particles_nb: 4 }
        }
      },
      retina_detect: true
    });
  </script>

</body>
</html>
