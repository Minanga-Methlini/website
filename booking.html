<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book a Service | Beyond Trust</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- Navbar -->
 <header class="fixed top-0 left-0 w-full bg-black bg-opacity-90 shadow backdrop-blur-md z-50">
  <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
    
    <!-- Logo -->
    <div class="flex items-center space-x-3">
      <img src="images/logo.png" alt="logo" class="h-12 w-12 rounded-full">
      <h1 class="text-2xl font-bold text-teal-300">Beyond Trust - Health Care Services</h1>
    </div>

    <!-- Navigation -->
    <nav class="space-x-6 text-white">
      <a href="index.html" class="inline-block hover:text-teal-300 hover:scale-105 transform transition duration-30 shadow-md">Home</a>
        <a href="services.html" class="inline-block hover:text-teal-300 hover:scale-105 transform transition duration-30 shadow-md">Services</a>
        <a href="booking.html" class="text-teal-300 font-semibold">Book Now</a>
        <a href="login.html"
         class="inline-block bg-blue-600 text-white px-4 py-1 rounded-lg
                hover:bg-teal-300 hover:text-black hover:scale-105 transform transition duration-300 shadow-md">
        Login
      </a>
    </nav>
  </div>
</header>

  <!-- Booking Form -->
  <section class="max-w-2xl mx-auto py-30 px-10 bg-indigo-100 rounded-lg shadow-lg mt-20">
    <h2 class="text-3xl font-bold mb-6 text-center text-blue-700">Book a Wellness Service</h2>

    <form action="booking_process.php" method="POST" class="bg-white p-8 rounded-lg shadow space-y-6">

      <!-- Full Name -->
      <div>
        <label for="name" class="block mb-1 font-medium">Full Name</label>
        <input type="text" id="name" name="name" required class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"/>
      </div>

      <!-- Email -->
      <div>
        <label for="email" class="block mb-1 font-medium">Email Address</label>
        <input type="email" id="email" name="email" required class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"/>
      </div>

      <!-- Service Type -->
      <div>
        <label for="service" class="block mb-1 font-medium">Select Service</label>
        <select id="service" name="service" required class="w-full px-4 py-2 border border-gray-300 rounded">
          <option value="" disabled selected>Select a service</option>
          <option value="massage">Massage Therapy</option>
          <option value="fitness">Personal Fitness</option>
          <option value="grooming">Grooming</option>
          <option value="eldercare">Eldercare Assistance</option>
        </select>
      </div>

      <!-- Provider -->
      <div>
        <label for="provider" class="block mb-1 font-medium">Preferred Provider</label>
        <input type="text" id="provider" name="provider" placeholder="(Optional)" class="w-full px-4 py-2 border border-gray-300 rounded"/>
      </div>

      <!-- Date and Time -->
      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <label for="date" class="block mb-1 font-medium">Preferred Date</label>
          <input type="date" id="date" name="date" required class="w-full px-4 py-2 border border-gray-300 rounded"/>
        </div>
        <div>
          <label for="time" class="block mb-1 font-medium">Preferred Time</label>
          <input type="time" id="time" name="time" required class="w-full px-4 py-2 border border-gray-300 rounded"/>
        </div>
      </div>

      <!-- Message -->
      <div>
        <label for="message" class="block mb-1 font-medium">Additional Notes</label>
        <textarea id="message" name="message" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded"></textarea>
      </div>

      <!-- Submit -->
      <div class="text-center">
        <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition">
          Confirm Booking
        </button>
      </div>

    </form>
  </section>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white py-4 text-center">
    © 2025 Beyond Trust Health Care Services
  </footer>

</body>
</html>
