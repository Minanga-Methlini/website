<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home | Beyond Trust</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="images/favicon.png" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Font: Inter (Optional) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    @keyframes fade-in-up {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in-up {
      animation: fade-in-up 1s ease-out forwards;
    }

    .animate-fade-in-delay {
      opacity: 0;
      animation: fade-in-up 1s ease-out 0.6s forwards;
    }

    .animate-bounce-slow {
      animation: bounce 3s infinite;
    }
  </style>
</head>

<body class="bg-white text-white">

  <!-- Navbar -->
  <header class="fixed top-0 left-0 w-full bg-black bg-opacity-60 shadow backdrop-blur-md z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <!-- Logo -->
      <div class="flex items-center space-x-3">
        <img src="images/logo.png" alt="logo" class="h-12 w-12 rounded-full" />
        <h1 class="text-2xl font-bold text-teal-300">Beyond Trust - Health Care Services</h1>
      </div>

      <!-- Navigation -->
      <nav class="space-x-6 text-white">
        <a href="index.html" class="text-teal-300 font-semibold">Home</a>
        <a href="services.html" class="hover:text-teal-300 hover:scale-105 transition duration-300">Services</a>
        <a href="booking.html" class="hover:text-teal-300 hover:scale-105 transition duration-300">Book Now</a>
        <a href="contacts.html" class="hover:text-teal-300 hover:scale-105 transition duration-300">Contact Us</a>
        <a href="login.html"
           class="inline-block bg-teal-300 text-black px-4 py-1 rounded-lg hover:bg-teal-200 hover:scale-105 transition duration-300 shadow-md">
          Login
        </a>
      </nav>
    </div>
  </header>

  <!-- Hero Section with Background Image and Particles -->
  <section class="relative min-h-screen flex items-center justify-center bg-cover bg-center bg-no-repeat" style="background-image: url('images/homepg.jpg');">
    
    <!-- Particles Container -->
    <div id="particles-js" class="absolute inset-0 z-0"></div>

    <!-- Dark Overlay -->
    <div class="absolute inset-0 bg-black bg-opacity-50 z-10"></div>

    <!-- Hero Content -->
    <div class="relative z-20 text-center px-6">
      <h1 class="text-4xl md:text-6xl font-extrabold mb-4 animate-fade-in-up">
        Welcome to <span class="text-teal-300">Beyond Trust</span>
      </h1>
      <p class="text-xl md:text-2xl font-medium mb-8 animate-fade-in-delay">
        Trusted <span id="rotateWord" class="font-bold text-teal-300"></span> services at your doorstep.
      </p>
      <a href="services.html"
         class="inline-block px-6 py-3 bg-teal-400 text-black font-semibold rounded-xl hover:bg-teal-300 hover:text-black transform hover:scale-105 transition duration-300 shadow-md">
        Explore Services
      </a>
    </div>
  </section>

  <!-- Particles.js Script -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

  <script>
    // Rotating words logic
    const words = ["Massage Therapy", "Fitness Coaching", "Eldercare", "Grooming"];
    let index = 0;
    const wordSpan = document.getElementById("rotateWord");

    function rotateWords() {
      wordSpan.textContent = words[index];
      index = (index + 1) % words.length;
    }

    rotateWords();
    setInterval(rotateWords, 2500);

    // Particles.js config
    particlesJS("particles-js", {
      "particles": {
        "number": {
          "value": 80,
          "density": {
            "enable": true,
            "value_area": 800
          }
        },
        "color": {
          "value": "#ffffff"
        },
        "shape": {
          "type": "circle",
          "stroke": {
            "width": 0,
            "color": "#000000"
          }
        },
        "opacity": {
          "value": 0.4,
          "random": false
        },
        "size": {
          "value": 3,
          "random": true
        },
        "line_linked": {
          "enable": true,
          "distance": 150,
          "color": "#ffffff",
          "opacity": 0.4,
          "width": 1
        },
        "move": {
          "enable": true,
          "speed": 4,
          "direction": "none",
          "out_mode": "out"
        }
      },
      "interactivity": {
        "detect_on": "canvas",
        "events": {
          "onhover": {
            "enable": true,
            "mode": "repulse"
          },
          "onclick": {
            "enable": true,
            "mode": "push"
          }
        },
        "modes": {
          "repulse": {
            "distance": 100
          },
          "push": {
            "particles_nb": 4
          }
        }
      },
      "retina_detect": true
    });
  </script>
</body>
</html>
