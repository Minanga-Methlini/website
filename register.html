<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | Beyond Trust</title>
   <link rel="icon" type="image/png" href="images/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
   <!-- Navbar -->
 <header class="fixed top-0 left-0 w-full bg-black bg-opacity-60 shadow backdrop-blur-md z-50">
  <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
    
    <!-- Logo -->
    <div class="flex items-center space-x-3">
      <img src="images/logo.png" alt="logo" class="h-12 w-12 rounded-full">
      <h1 class="text-2xl font-bold text-teal-300">Beyond Trust - Health Care Services</h1>
    </div>

    <!-- Navigation -->
    <nav class="space-x-6 text-white">
      <a href="index.html" class="inline-block hover:text-teal-300 hover:scale-105 transform transition duration-30 shadow-md">Home</a>
        <a href="services.html" class="text-teal-300 font-semibold">Services</a>
        <a href="booking.html" class="inline-block hover:text-teal-300 hover:scale-105 transform transition duration-30 shadow-md">Book Now</a>
         <a href="contacts.html" class=" inline-block hover:text-teal-300 hover:scale-105 transform transition duration-30 shadow-md">Contact Us</a>
        <a href="login.html"
         class="inline-block bg-blue-600 text-white px-4 py-1 rounded-lg
                hover:bg-teal-300 hover:text-black hover:scale-105 transform transition duration-300 shadow-md">
        Login
      </a>
    </nav>
  </div>
</header>

  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md py-30 px-10 bg-indigo-100 rounded-lg shadow-lg mt-20">
    <h2 class="text-2xl font-bold text-center text-blue-700 mb-6">Create an Account</h2>

    <form action="register_process.php" method="POST" class="space-y-4">
      <div>
        <label for="name" class="block text-sm font-medium">Full Name</label>
        <input type="text" name="name" id="name" required
               class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"/>
      </div>

      <div>
        <label for="email" class="block text-sm font-medium">Email Address</label>
        <input type="email" name="email" id="email" required
               class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"/>
      </div>

      <div>
        <label for="role" class="block text-sm font-medium">Register as</label>
        <select name="role" id="role" required
                class="w-full px-4 py-2 border border-gray-300 rounded">
          <option value="">-- Select Role --</option>
          <option value="user">User</option>
          <option value="provider">Provider</option>
        </select>
      </div>

      <div>
        <label for="password" class="block text-sm font-medium">Password</label>
        <input type="password" name="password" id="password" required
               class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"/>
      </div>

      <div>
        <label for="confirm_password" class="block text-sm font-medium">Confirm Password</label>
        <input type="password" name="confirm_password" id="confirm_password" required
               class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"/>
      </div>

      <div class="text-sm text-center">
        Already have an account? <a href="login.html" class="text-blue-600 hover:underline">Login</a>
      </div>

      <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">
        Register
      </button>
    </form>
  </div>

</body>
</html>
