<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | Beyond Trust</title>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    #particles-js {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

  </style>
</head>
<body class="relative bg-gray-900 text-white min-h-screen">

  <!-- Particle Background -->
  <div id="particles-js" class="absolute inset-0"></div>

  <!-- Dark Overlay -->
  <div class="fixed inset-0 bg-black bg-opacity-60 z-0"></div>


  <!-- Navbar -->
  <header class="fixed top-0 left-0 w-full bg-black bg-opacity-60 shadow backdrop-blur-md z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <!-- Logo -->
      <div class="flex items-center space-x-3">
        <img src="images/logo.png" alt="logo" class="h-12 w-12 rounded-full" />
        <h1 class="text-2xl font-bold text-teal-300">Beyond Trust - Health Care Services</h1>
      </div>

      <!-- Navigation -->
      <nav class="space-x-6 text-white">
        <a href="index.html" class="hover:text-teal-300 transition">Home</a>
        <a href="services.html" class="hover:text-teal-300 transition">Services</a>
        <a href="booking.html" class="hover:text-teal-300 transition">Book Now</a>
        <a href="contacts.html" class="hover:text-teal-300 transition">Contact Us</a>
        <a href="login.html"
           class="bg-teal-300 text-black px-4 py-1 rounded-lg hover:bg-teal-200 transition shadow-md">
          Login
        </a>
      </nav>
    </div>
  </header>

  <!-- Main Form Content -->
  <main class="relative z-10 flex justify-center items-center pt-32 pb-10 px-4">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md bg-opacity-90 text-black">
      <h2 class="text-2xl font-bold text-center text-blue-700 mb-6">Registration Form</h2>

      <form action="register_process.php" method="POST" class="space-y-4">
        <div>
          <label for="name" class="block text-sm font-medium">Full Name</label>
          <input type="text" name="name" id="name" required
                 class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>

        <div>
          <label for="email" class="block text-sm font-medium">Email Address</label>
          <input type="email" name="email" id="email" required
                 class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>

        <div>
          <label for="role" class="block text-sm font-medium">Register as</label>
          <select name="role" id="role" required
                  class="w-full px-4 py-2 border border-gray-300 rounded">
            <option value="">-- Select Role --</option>
            <option value="user">User</option>
            <option value="provider">Provider</option>
          </select>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium">Password</label>
          <input type="password" name="password" id="password" required
                 class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>

        <div>
          <label for="confirm_password" class="block text-sm font-medium">Confirm Password</label>
          <input type="password" name="confirm_password" id="confirm_password" required
                 class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>

        <div class="text-sm text-center">
          Already have an account? <a href="login.html" class="text-blue-600 hover:underline">Login</a>
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">
          Register
        </button>
      </form>
    </div>
  </main>

    <!-- Footer -->
  <footer class="relative z-10 text-center py-6 bg-black bg-opacity-80 text-white">
    © 2025 Beyond Trust Health Care Services. All rights reserved.
  </footer>

  <!-- Particle.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

  <!-- Particle.js Configuration -->
  <script>
    particlesJS("particles-js", {
      particles: {
        number: {
          value: 60,
          density: {
            enable: true,
            value_area: 800
          }
        },
        color: {
          value: "#ffffff"
        },
        shape: {
          type: "circle",
          stroke: {
            width: 0,
            color: "#000000"
          }
        },
        opacity: {
          value: 0.5,
          random: false
        },
        size: {
          value: 3,
          random: true
        },
        line_linked: {
          enable: true,
          distance: 150,
          color: "#ffffff",
          opacity: 0.4,
          width: 1
        },
        move: {
          enable: true,
          speed: 3,
          direction: "none",
          out_mode: "out"
        }
      },
      interactivity: {
        events: {
          onhover: {
            enable: true,
            mode: "repulse"
          },
          onclick: {
            enable: true,
            mode: "push"
          }
        },
        modes: {
          repulse: {
            distance: 100
          },
          push: {
            particles_nb: 4
          }
        }
      },
      retina_detect: true
    });
  </script>
</body>
</html>
