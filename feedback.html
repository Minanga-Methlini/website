<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feedback | Beyond Trust</title>
  <link rel="icon" href="images/favicon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
  <style>
    html, body {
      height: 100%;
    }
  </style>
</head>
<body class="relative bg-gray-900 text-white">

  <!-- Particles Background -->
  <div id="particles-js" class="absolute inset-0 z-0"></div>

  <!-- Navbar -->
  <header class="fixed top-0 left-0 w-full bg-black bg-opacity-70 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <div class="flex items-center space-x-3">
        <img src="images/logo.png" alt="logo" class="h-10 w-10 rounded-full">
        <h1 class="text-2xl font-bold text-teal-300">Beyond Trust - Feedback</h1>
      </div>
      <nav class="space-x-6 text-white">
        <a href="index.html" class="hover:text-teal-300">Home</a>
        <a href="services.html" class="hover:text-teal-300">Services</a>
        <a href="booking.html" class="hover:text-teal-300">Book Now</a>
        <a href="contacts.html" class="hover:text-teal-300">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Feedback Form -->
  <main class="relative z-10 pt-32 pb-16 px-4 max-w-xl mx-auto">
    <div class="bg-black bg-opacity-70 p-8 rounded-lg shadow-lg">
      <h2 class="text-3xl font-bold text-center text-teal-300 mb-6">We Value Your Feedback</h2>

      <form action="submit_feedback.php" method="POST" class="space-y-5">
        <div>
          <label for="name" class="block text-sm font-semibold">Full Name</label>
          <input type="text" id="name" name="name" required
            class="w-full mt-1 px-4 py-2 rounded bg-gray-100 text-black focus:outline-none focus:ring-2 focus:ring-teal-400"/>
        </div>

        <div>
          <label for="email" class="block text-sm font-semibold">Email</label>
          <input type="email" id="email" name="email" required
            class="w-full mt-1 px-4 py-2 rounded bg-gray-100 text-black focus:outline-none focus:ring-2 focus:ring-teal-400"/>
        </div>

        <div>
          <label for="rating" class="block text-sm font-semibold">Rating</label>
          <select id="rating" name="rating" required
            class="w-full mt-1 px-4 py-2 rounded bg-gray-100 text-black focus:outline-none focus:ring-2 focus:ring-teal-400">
            <option value="">Select Rating</option>
            <option value="5">★★★★★ - Excellent</option>
            <option value="4">★★★★ - Good</option>
            <option value="3">★★★ - Average</option>
            <option value="2">★★ - Poor</option>
            <option value="1">★ - Terrible</option>
          </select>
        </div>

        <div>
          <label for="message" class="block text-sm font-semibold">Your Message</label>
          <textarea id="message" name="message" rows="4" required
            class="w-full mt-1 px-4 py-2 rounded bg-gray-100 text-black focus:outline-none focus:ring-2 focus:ring-teal-400"
            placeholder="Write your thoughts here..."></textarea>
        </div>

        <button type="submit"
          class="w-full py-2 bg-teal-500 hover:bg-teal-400 text-black font-semibold rounded transition duration-300">
          Submit Feedback
        </button>
      </form>
    </div>
  </main>

  <!-- Footer -->
  <footer class="relative z-10 text-center py-6 bg-black bg-opacity-80 text-white">
    © 2025 Beyond Trust Health Care Services. All rights reserved.
  </footer>

  <!-- Particles.js Config -->
  <script>
    particlesJS("particles-js", {
      particles: {
        number: { value: 70 },
        color: { value: "#00f7ff" },
        shape: { type: "circle" },
        opacity: { value: 0.3 },
        size: { value: 3 },
        move: {
          enable: true,
          speed: 1,
          direction: "none",
          out_mode: "out"
        }
      },
      interactivity: {
        events: {
          onhover: { enable: true, mode: "repulse" },
          onclick: { enable: true, mode: "push" }
        },
        modes: {
          repulse: { distance: 100 },
          push: { particles_nb: 4 }
        }
      },
      retina_detect: true
    });
  </script>

</body>
</html>
