<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feedback | Beyond Trust</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .star {
      cursor: pointer;
      transition: transform 0.2s;
    }
    .star:hover {
      transform: scale(1.1);
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- Navbar -->
  <header class="bg-white shadow">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-blue-600">Beyond Trust</h1>
      <nav class="space-x-4">
        <a href="index.html" class="hover:underline">Home</a>
        <a href="services.html" class="hover:underline">Services</a>
        <a href="dashboard.html" class="hover:underline">Dashboard</a>
        <a href="logout.php" class="text-red-500 hover:underline">Logout</a>
      </nav>
    </div>
  </header>

  <!-- Feedback Form -->
  <section class="max-w-2xl mx-auto py-12 px-6">
    <h2 class="text-3xl font-bold mb-6 text-center text-blue-700">Leave Feedback</h2>

    <form action="feedback_process.php" method="POST" class="bg-white p-8 rounded shadow space-y-6">

      <!-- Service Dropdown -->
      <div>
        <label for="service" class="block mb-1 font-medium">Service Used</label>
        <select name="service" id="service" required class="w-full px-4 py-2 border border-gray-300 rounded">
          <option value="">-- Select Service --</option>
          <option value="massage">Massage Therapy</option>
          <option value="fitness">Personal Fitness</option>
          <option value="grooming">Grooming</option>
          <option value="eldercare">Eldercare Assistance</option>
        </select>
      </div>

      <!-- Star Rating -->
      <div>
        <label class="block mb-2 font-medium">Your Rating</label>
        <div class="flex space-x-1 text-yellow-400 text-3xl" id="star-container">
          <span class="star" data-value="1">&#9733;</span>
          <span class="star" data-value="2">&#9733;</span>
          <span class="star" data-value="3">&#9733;</span>
          <span class="star" data-value="4">&#9733;</span>
          <span class="star" data-value="5">&#9733;</span>
        </div>
        <input type="hidden" name="rating" id="rating" value="0" required>
      </div>

      <!-- Feedback Message -->
      <div>
        <label for="message" class="block mb-1 font-medium">Your Feedback</label>
        <textarea name="message" id="message" rows="5" placeholder="What did you like or dislike?"
                  class="w-full px-4 py-2 border border-gray-300 rounded"></textarea>
      </div>

      <!-- Submit Button -->
      <div class="text-center">
        <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition">
          Submit Feedback
        </button>
      </div>

    </form>
  </section>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white py-4 text-center">
    © 2025 Beyond Trust Health Care Services
  </footer>

  <!-- Rating Script -->
  <script>
    const stars = document.querySelectorAll(".star");
    const ratingInput = document.getElementById("rating");

    stars.forEach(star => {
      star.addEventListener("click", () => {
        const value = star.getAttribute("data-value");
        ratingInput.value = value;

        stars.forEach(s => {
          if (s.getAttribute("data-value") <= value) {
            s.style.color = "#facc15"; // yellow-400
          } else {
            s.style.color = "#d1d5db"; // gray-300
          }
        });
      });
    });
  </script>

</body>
</html>
