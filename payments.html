<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment | Beyond Trust</title>
  <link rel="icon" href="images/favicon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
  <style>
    html, body {
      height: 100%;
    }
  </style>
</head>
<body class="relative bg-black text-black">

  <!-- Particles Background -->
  <div id="particles-js" class="fixed inset-0 z-0"></div>

  <!-- Navbar -->
  <header class="fixed top-0 left-0 w-full bg-black bg-opacity-70 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <div class="flex items-center space-x-3">
        <img src="images/logo.png" alt="logo" class="h-10 w-10 rounded-full">
        <h1 class="text-2xl font-bold text-teal-300">Beyond Trust - Payment</h1>
      </div>
      <nav class="space-x-6 text-white">
        <a href="index.html" class="hover:text-teal-300">Home</a>
        <a href="services.html" class="hover:text-teal-300">Services</a>
        <a href="booking.html" class="hover:text-teal-300">Book Now</a>
        <a href="contacts.html" class="hover:text-teal-300">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Payment Form -->
  <main class="relative z-10 pt-32 pb-16 px-4 max-w-xl mx-auto">
    <div class="bg-white bg-opacity-80 p-8 rounded-lg shadow-lg">
      <h2 class="text-3xl font-bold text-center text-blue-600 mb-6">Secure Payment</h2>

      <form action="process_payment.php" method="POST" class="space-y-5">
        <!-- Card Type -->
        <div>
          <label class="block text-sm font-semibold mb-1">Card Type</label>
          <div class="flex items-center space-x-6">
            <label class="flex items-center space-x-2">
              <input type="radio" name="card_type" value="credit" required>
              <span>Credit Card</span>
            </label>
            <label class="flex items-center space-x-2">
              <input type="radio" name="card_type" value="debit">
              <span>Debit Card</span>
            </label>
          </div>
        </div>

        <!-- Card Brand -->
        <div>
          <label class="block text-sm font-semibold mb-1">Card Brand</label>
          <div class="flex items-center space-x-4">
            <label class="flex items-center space-x-2">
              <input type="radio" name="brand" value="visa" required>
              <img src="https://img.icons8.com/color/48/visa.png" alt="Visa" class="h-6"/>
              <span>Visa</span>
            </label>
            <label class="flex items-center space-x-2">
              <input type="radio" name="brand" value="mastercard">
              <img src="https://img.icons8.com/color/48/mastercard.png" alt="MasterCard" class="h-6"/>
              <span>MasterCard</span>
            </label>
          </div>
        </div>

        <!-- Card Details -->
        <div>
          <label for="card-name" class="block text-sm font-semibold">Name</label>
          <input type="text" id="card-name" name="card_name" required
            class="w-full mt-1 px-4 py-2 rounded bg-gray-100 text-black focus:outline-none focus:ring-2 focus:ring-teal-400"/>
        </div>

        <div>
          <label for="card-number" class="block text-sm font-semibold">Card Number</label>
          <input type="text" id="card-number" name="card_number" maxlength="16" required
            class="w-full mt-1 px-4 py-2 rounded bg-gray-100 text-black focus:outline-none focus:ring-2 focus:ring-teal-400"/>
        </div>

        <div class="flex space-x-4">
          <div class="w-1/2">
            <label for="expiry" class="block text-sm font-semibold">Expiry Date</label>
            <input type="text" id="expiry" name="expiry" placeholder="MM/YY" required
              class="w-full mt-1 px-4 py-2 rounded bg-gray-100 text-black focus:outline-none focus:ring-2 focus:ring-teal-400"/>
          </div>
          <div class="w-1/2">
            <label for="cvv" class="block text-sm font-semibold">CVV</label>
            <input type="password" id="cvv" name="cvv" maxlength="4" required
              class="w-full mt-1 px-4 py-2 rounded bg-gray-100 text-black focus:outline-none focus:ring-2 focus:ring-teal-400"/>
          </div>
        </div>

        <div>
          <label for="amount" class="block text-sm font-semibold">Amount (LKR)</label>
          <input type="number" id="amount" name="amount" required min="0"
            class="w-full mt-1 px-4 py-2 rounded bg-gray-100 text-black focus:outline-none focus:ring-2 focus:ring-teal-400"/>
        </div>

        <button type="submit"
          class="w-full py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded transition duration-300">
          Pay Now
        </button>
      </form>
    </div>
  </main>

  <!-- Footer -->
  <footer class="relative z-10 text-center py-6 bg-black bg-opacity-80 text-white">
    © 2025 Beyond Trust Health Care Services. All rights reserved.
  </footer>

  <!-- Particles.js Config -->
  <script>
    particlesJS("particles-js", {
      particles: {
        number: { value: 80 },
        color: { value: "#00f7ff" },
        shape: { type: "circle" },
        opacity: { value: 0.3 },
        size: { value: 3 },
        move: {
          enable: true,
          speed: 1,
          direction: "none",
          out_mode: "out"
        }
      },
      interactivity: {
        events: {
          onhover: { enable: true, mode: "repulse" },
          onclick: { enable: true, mode: "push" }
        },
        modes: {
          repulse: { distance: 100 },
          push: { particles_nb: 4 }
        }
      },
      retina_detect: true
    });
  </script>

</body>
</html>
