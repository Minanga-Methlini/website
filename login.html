<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Beyond Trust</title>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    #particles-js {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
  </style>
</head>
<body class="bg-black text-gray-900 relative">

  <!-- Particle Background -->
  <div id="particles-js"></div>

  <!-- Navbar -->
  <header class="fixed top-0 left-0 w-full bg-black bg-opacity-60 shadow backdrop-blur-md z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <div class="flex items-center space-x-3">
        <img src="images/logo.png" alt="logo" class="h-12 w-12 rounded-full">
        <h1 class="text-2xl font-bold text-teal-300">Beyond Trust - Health Care Services</h1>
      </div>
      <nav class="space-x-6 text-white">
        <a href="index.html" class="hover:text-teal-300 hover:scale-105 transition">Home</a>
        <a href="services.html" class="hover:text-teal-300 hover:scale-105 transition">Services</a>
        <a href="booking.html" class="hover:text-teal-300 hover:scale-105 transition">Book Now</a>
        <a href="contacts.html" class="hover:text-teal-300 hover:scale-105 transition">Contact Us</a>
        <a href="login.html" class="bg-teal-300 text-black px-4 py-1 rounded-lg hover:bg-teal-300 hover:text-black transition">
          Login
        </a>
      </nav>
    </div>
  </header>

  <!-- Login Form -->
  <main class="relative z-10 flex items-center justify-center min-h-screen pt-20 px-4">
    <div class="bg-white bg-opacity-90 p-8 rounded-lg shadow-lg w-full max-w-md backdrop-blur">
      <h2 class="text-2xl font-bold text-center text-blue-700 mb-6">Login to Beyond Trust</h2>

      <form action="login_process.php" method="POST" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium">Email Address</label>
          <input type="email" name="email" id="email" required
                 class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium">Password</label>
          <input type="password" name="password" id="password" required
                 class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>

        <div class="flex justify-between items-center text-sm">
          <a href="register.html" class="text-blue-600 hover:underline">Create an account</a>
          <a href="#" class="text-gray-500 hover:underline">Forgot password?</a>
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">
          Login
        </button>
      </form>
    </div>
  </main>

  <!-- Particle Config -->
  <script>
    particlesJS("particles-js", {
      "particles": {
        "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
        "color": { "value": "#38bdf8" },
        "shape": { "type": "circle" },
        "opacity": { "value": 0.3, "random": true },
        "size": { "value": 3, "random": true },
        "line_linked": { "enable": true, "distance": 150, "color": "#38bdf8", "opacity": 0.2, "width": 1 },
        "move": { "enable": true, "speed": 2 }
      },
      "interactivity": {
        "events": {
          "onhover": { "enable": true, "mode": "grab" },
          "onclick": { "enable": true, "mode": "push" }
        },
        "modes": {
          "grab": { "distance": 140, "line_linked": { "opacity": 0.5 } },
          "push": { "particles_nb": 4 }
        }
      },
      "retina_detect": true
    });
  </script>

</body>
</html>
